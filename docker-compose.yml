version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:7860"
    volumes:
      - ./checkpoints:/home/user/app/checkpoints:ro
    environment:
      - MODEL_PATH=checkpoints/combined_final.pt
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api
